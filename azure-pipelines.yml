# Maven
# Build your Java project and run tests with Apache Maven.
# Add steps that analyze code, save build artifacts, deploy, and more:
# https://docs.microsoft.com/azure/devops/pipelines/languages/java

trigger:
- master

pool:
  vmImage: ubuntu-latest

steps:

# 1. Build the WAR using Maven + Java 17
- task: Maven@3
  displayName: 'Build WAR with Maven'
  inputs:
    mavenPomFile: 'pom.xml'
    mavenOptions: '-Xmx3072m'
    javaHomeOption: 'JDKVersion'
    jdkVersionOption: '1.17'
    jdkArchitectureOption: 'x64'
    publishJUnitResults: true
    testResultsFiles: '**/surefire-reports/TEST-*.xml'
    goals: 'clean package'


# 2. Verify Maven created the WAR
- script: |
    echo "Contents of target directory:"
    ls -la target
  displayName: 'Verify WAR created'


# 3. Copy WAR into artifact staging folder
- task: CopyFiles@2
  displayName: 'Copy WAR to artifact staging'
  inputs:
    SourceFolder: '$(System.DefaultWorkingDirectory)/target'
    Contents: '**/*.war'
    TargetFolder: '$(Build.ArtifactStagingDirectory)'


# 4. Verify artifact staging contains WAR
- script: |
    echo "Contents of artifact staging directory:"
    ls -la $(Build.ArtifactStagingDirectory)
  displayName: 'Verify artifact contents'


# 5. Publish artifact for Release pipeline
- task: PublishBuildArtifacts@1
  displayName: 'Publish WAR artifact'
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)'
    ArtifactName: 'drop'
    publishLocation: 'Container'